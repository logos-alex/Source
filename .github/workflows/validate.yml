name: Validate project

on:
  pull_request:
    branches:
      - main
      - work
  push:
    branches:
      - work

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.11.0'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Normalize npm proxy config
        run: |
          npm config delete proxy || true
          npm config delete http-proxy || true
          npm config delete https-proxy || true

      - name: Install dependencies
        run: env -u npm_config_http_proxy -u npm_config_https_proxy -u NPM_CONFIG_HTTP_PROXY -u NPM_CONFIG_HTTPS_PROXY npm ci

      - name: Audit dependencies (high+)
        run: env -u npm_config_http_proxy -u npm_config_https_proxy -u NPM_CONFIG_HTTP_PROXY -u NPM_CONFIG_HTTPS_PROXY npm run audit
        continue-on-error: true

      - name: Validate project (full CI chain)
        run: env -u npm_config_http_proxy -u npm_config_https_proxy -u NPM_CONFIG_HTTP_PROXY -u NPM_CONFIG_HTTPS_PROXY npm run ci:verify

      - name: Upload _site artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: site-preview
          path: _site
          if-no-files-found: warn
          retention-days: 7

      - name: Upload Pagefind artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: pagefind-index
          path: _site/pagefind
          if-no-files-found: warn
          retention-days: 7
