name: Deploy static site to gh-pages branch (manual fallback)

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Normalize npm proxy config
        run: |
          npm config delete proxy || true
          npm config delete http-proxy || true
          npm config delete https-proxy || true

      - name: Install dependencies
        run: env -u npm_config_http_proxy -u npm_config_https_proxy -u NPM_CONFIG_HTTP_PROXY -u NPM_CONFIG_HTTPS_PROXY npm ci

      - name: Build site
        run: |
          if npm run | grep -q "build"; then
            env -u npm_config_http_proxy -u npm_config_https_proxy -u NPM_CONFIG_HTTP_PROXY -u NPM_CONFIG_HTTPS_PROXY npm run build
            env -u npm_config_http_proxy -u npm_config_https_proxy -u NPM_CONFIG_HTTP_PROXY -u NPM_CONFIG_HTTPS_PROXY npm run check:release-content
          else
            echo "Missing npm script: build" >&2
            npm run
            exit 1
          fi

      - name: Deploy _site to gh-pages branch
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin gh-pages; then
            git worktree add /tmp/gh-pages gh-pages
          else
            git worktree add -b gh-pages /tmp/gh-pages
          fi

          rsync -a --delete ./_site/ /tmp/gh-pages/
          touch /tmp/gh-pages/.nojekyll

          cd /tmp/gh-pages
          if [ -n "$(git status --porcelain)" ]; then
            git add --all
            git commit -m "Deploy static site from ${GITHUB_SHA}"
            git push origin gh-pages
          else
            echo "No changes to deploy."
          fi

          cd -
          git worktree remove /tmp/gh-pages --force
