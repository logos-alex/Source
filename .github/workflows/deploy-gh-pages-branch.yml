name: Deploy static site to gh-pages branch (manual fallback)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: |
          if node -e "const s=require('./package.json').scripts||{}; process.exit(s.build?0:1)"; then
            npm run build
            npm run --if-present check:release-content
            if ! node -e "const s=require('./package.json').scripts||{}; process.exit(s['check:release-content']?0:1)"; then
              echo "check:release-content script not found; skipped optional release-content validation"
            fi
          else
            echo "Missing npm script: build" >&2
            npm run
            exit 1
          fi

      - name: Deploy _site to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          force_orphan: true
