name: Deploy static site to gh-pages branch (manual fallback)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check frontmatter integrity
        run: npm run check:frontmatter
      - name: Build site
        run: npm run build

      - name: Check pathPrefix integrity
        run: npm run check:pathprefix

      - name: Deploy _site to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          force_orphan: true
