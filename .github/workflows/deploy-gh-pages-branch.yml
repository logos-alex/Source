name: Deploy static site to gh-pages branch (manual fallback)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Normalize npm proxy config
        run: |
          npm config delete proxy || true
          npm config delete http-proxy || true
          npm config delete https-proxy || true

      - name: Install dependencies
        run: env -u npm_config_http_proxy -u npm_config_https_proxy -u NPM_CONFIG_HTTP_PROXY -u NPM_CONFIG_HTTPS_PROXY npm ci

      - name: Build site
        run: |
          if npm run | grep -q "build"; then
            env -u npm_config_http_proxy -u npm_config_https_proxy -u NPM_CONFIG_HTTP_PROXY -u NPM_CONFIG_HTTPS_PROXY npm run build
            env -u npm_config_http_proxy -u npm_config_https_proxy -u NPM_CONFIG_HTTP_PROXY -u NPM_CONFIG_HTTPS_PROXY npm run check:release-content
          else
            echo "Missing npm script: build" >&2
            npm run
            exit 1
          fi

      - name: Deploy _site to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          force_orphan: true
